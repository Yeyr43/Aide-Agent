name: Build & Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:  # 手动触发测试

env:
  PYTHONIOENCODING: utf-8

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: uv sync

      - name: Show environment
        run: |
          uv run python --version
          uv run python -c "import sys; print(f'Platform: {sys.platform}')"

      - name: Run tests
        run: uv run pytest tests/ -q --tb=short

  build:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: uv sync

      - name: Download ONNX model
        run: uv run python scripts/build.py --no-installer
        env:
          BUILD_ONLY_MODEL: '1'

      - name: Build with PyInstaller
        run: uv run python scripts/build.py --no-model

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: aide-${{ matrix.os }}
          path: dist/Aide/

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Package artifacts
        run: |
          cd artifacts
          for d in aide-*; do
            if [[ "$d" == *"windows"* ]]; then
              (cd "$d" && zip -r "../../aide-windows-x64.zip" .)
            elif [[ "$d" == *"macos"* ]]; then
              (cd "$d" && tar -czf "../../aide-macos-x64.tar.gz" .)
            elif [[ "$d" == *"ubuntu"* ]]; then
              (cd "$d" && tar -czf "../../aide-linux-x64.tar.gz" .)
            fi
          done

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            aide-windows-x64.zip
            aide-macos-x64.tar.gz
            aide-linux-x64.tar.gz
          generate_release_notes: true
